<div class="container">
  <h2 class="page-title">Admin Dashboard</h2>

  <button mat-raised-button color="primary">
    Add Product
  </button>

  <table mat-table [dataSource]="[1,2,3]" class="mat-elevation-z8">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Product </th>
      <td mat-cell *matCellDef="let element"> Product Name </td>
    </ng-container>

    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef> Price </th>
      <td mat-cell *matCellDef="let element"> ₹999 </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let element">
        <button mat-button color="accent">Edit</button>
        <button mat-button color="warn">Delete</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['name','price','actions']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['name','price','actions'];"></tr>

  </table>
</div>
